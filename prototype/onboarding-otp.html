<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verifikasi OTP — SantriKalong</title>
<script>(function(){try{var e=document.documentElement,t=localStorage.getItem('sk_theme'),m=localStorage.getItem('sk_mode'),s=localStorage.getItem('sk_text');e.dataset.theme=t||'pelita-malam';e.dataset.mode=m||'dark';if(s==='large')e.dataset.textsize='large';}catch(_){var x=document.documentElement;x.dataset.theme='pelita-malam';x.dataset.mode='dark';}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/app.css">
<style>
.wrap{min-height:100vh;display:grid;place-items:center;padding:1.5rem}
.otp{display:flex;gap:.6rem;justify-content:center;margin:1.4rem 0}
.otp input{width:50px;height:60px;text-align:center;font-size:1.5rem;font-family:var(--font-display);border:1px solid rgb(var(--border));border-radius:var(--r-md);background:rgb(var(--surface));color:rgb(var(--text))}
.otp input:focus{outline:none;border-color:rgb(var(--brand));box-shadow:0 0 0 3px rgb(var(--brand)/.18)}
</style>
</head>
<body>
<div class="wrap">
  <div class="card card-pad center" style="max-width:420px;width:100%;padding:2rem">
    <span class="avatar" style="width:60px;height:60px;margin:0 auto;background:rgb(var(--brand-subtle)/.16);color:rgb(var(--brand))"><svg class="ico ico-lg"><use href="#i-shield"/></svg></span>
    <h1 style="font-size:1.5rem;margin-top:1rem">Verifikasi akunmu</h1>
    <p class="muted" style="font-size:.9rem;margin-top:.4rem">Kami kirim 6 digit kode ke <b style="color:rgb(var(--text))">ahmad@mail.com</b> &amp; WhatsApp.</p>
    <div class="otp"><input maxlength="1" value="8"><input maxlength="1" value="2"><input maxlength="1" value="4"><input maxlength="1"><input maxlength="1"><input maxlength="1"></div>
    <a href="dashboard.html" class="btn btn-primary btn-block btn-lg">Verifikasi</a>
    <p class="muted" style="font-size:.85rem;margin-top:1rem">Belum dapat kode? <a href="#" style="color:rgb(var(--brand))">Kirim ulang (00:42)</a></p>
  </div>
</div>
<script src="assets/app.js"></script>
</body>
</html>
